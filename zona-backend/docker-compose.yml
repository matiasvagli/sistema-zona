version: '3.8'

services:
  db:
    image: postgres:15
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=zona_db
      - POSTGRES_USER=zona_user
      - POSTGRES_PASSWORD=zona_pass
    ports:
      - "5432:5432"

  backend:
    build: .
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgres://zona_user:zona_pass@db:5432/zona_db
      - DEBUG=True
      - SECRET_KEY=django-insecure-change-me
    depends_on:
      - db

volumes:
  postgres_data:
